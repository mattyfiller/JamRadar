<script>
  // Register the service worker + show a non-disruptive update banner when
  // a new version is ready. We used to auto-reload on controllerchange,
  // which interrupted users mid-tap (a Back button press could land on a
  // freshly-reloaded home screen, looking like the back button "didn't
  // work"). Now we install in the background, show a small toast/banner,
  // and let the user reload on their schedule.
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      const showUpdateToast = () => {
        // Fire the in-app toast event listened to by the App component.
        // If the app isn't mounted yet (very early), fall back to a confirm.
        const detail = { msg: 'New version ready — tap to refresh', action: 'reload' };
        window.dispatchEvent(new CustomEvent('jr:toast', { detail }));
      };
      // Manual reload via the toast click (App.jsx wires this).
      window.__jrReloadForUpdate = () => {
        if (navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({ type: 'SKIP_WAITING_AND_RELOAD' });
        }
        window.location.reload();
      };
      navigator.serviceWorker.register('service-worker.js')
        .then((reg) => {
          if (reg.waiting) showUpdateToast();
          reg.addEventListener('updatefound', () => {
            const newWorker = reg.installing;
            if (!newWorker) return;
            newWorker.addEventListener('statechange', () => {
              if (newWorker.state === 'installed' && navigator.serviceWorker.controller) {
                showUpdateToast();
              }
            });
          });
        })
        .catch((err) => console.warn('SW register failed:', err));
    });
  }
</script>
